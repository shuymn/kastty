name: Refresh Nerd Font Assets

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
    branches:
      - main
    paths:
      - scripts/update-nerd-font.sh

permissions:
  contents: write

concurrency:
  group: refresh-nerd-font-${{ github.event.pull_request.number }}
  cancel-in-progress: false

jobs:
  refresh-nerd-font-assets:
    runs-on: ubuntu-latest
    if: startsWith(github.head_ref, 'renovate/')
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Create app token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ vars.APP_ID }}
          private-key: ${{ secrets.PRIVATE_KEY }}
          permission-contents: write

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false
          ref: ${{ github.head_ref }}
          fetch-depth: 0

      - name: Check if target versions changed
        id: check-target
        run: |
          set -euo pipefail

          git fetch origin "${{ github.base_ref }}" --depth=1
          if git diff --unified=0 "origin/${{ github.base_ref }}"...HEAD -- scripts/update-nerd-font.sh \
            | grep -Eq '^[+-](NERD_FONTS_VERSION|FONTTOOLS_VERSION|BROTLI_VERSION)='; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup uv
        if: steps.check-target.outputs.run == 'true'
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Update Nerd Font assets
        if: steps.check-target.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          ./scripts/update-nerd-font.sh

      - name: Verify Nerd Font asset generation is idempotent
        if: steps.check-target.outputs.run == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          first_font_hash="$(sha256sum web/fonts/SymbolsNerdFontMono-Regular.woff2 | awk '{print $1}')"
          first_license_hash="$(sha256sum web/fonts/NerdFontsSymbolsOnly-LICENSE | awk '{print $1}')"

          ./scripts/update-nerd-font.sh

          second_font_hash="$(sha256sum web/fonts/SymbolsNerdFontMono-Regular.woff2 | awk '{print $1}')"
          second_license_hash="$(sha256sum web/fonts/NerdFontsSymbolsOnly-LICENSE | awk '{print $1}')"

          if [[ "${first_font_hash}" != "${second_font_hash}" || "${first_license_hash}" != "${second_license_hash}" ]]; then
            echo "Nerd Font asset generation is not idempotent"
            git diff -- web/fonts/SymbolsNerdFontMono-Regular.woff2 web/fonts/NerdFontsSymbolsOnly-LICENSE || true
            exit 1
          fi

      - name: Commit and push refreshed assets
        if: steps.check-target.outputs.run == 'true'
        env:
          PUSH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail

          if [[ -z "$(git status --porcelain -- web/fonts/SymbolsNerdFontMono-Regular.woff2 web/fonts/NerdFontsSymbolsOnly-LICENSE)" ]]; then
            echo "No Nerd Font asset changes detected"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/fonts/SymbolsNerdFontMono-Regular.woff2 web/fonts/NerdFontsSymbolsOnly-LICENSE
          git commit -m "chore: refresh Nerd Font assets"

          for attempt in 1 2 3; do
            if git push "https://x-access-token:${PUSH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" HEAD:"${GITHUB_HEAD_REF:?}"; then
              exit 0
            fi

            if [[ "${attempt}" -eq 3 ]]; then
              echo "Push failed after ${attempt} attempts"
              exit 1
            fi

            echo "Push rejected; rebasing on origin/${GITHUB_HEAD_REF:?} and retrying..."
            git fetch origin "${GITHUB_HEAD_REF:?}"
            git rebase "origin/${GITHUB_HEAD_REF:?}"
          done
